name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create extension ZIP
        run: cd dist && zip -r ../jump-extension.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jump-extension
          path: jump-extension.zip
